prefix: "<gray>[<gold>FoxCore</gold>]</gray> "

event:
  join:
    broadcast: "<gray>[<gold>+</gold>]</gray> <green><white>%player%</white> joined the server.</green>"
    first-broadcast: "<gray>[<gold>★</gold>]</gray> <gold><white>%player%</white> joined the server for the first time.</gold>"
    personal-lines:
      - "<dark_gray>--------------------------------------------------</dark_gray>"
      - "<gold>Welcome, <white>%player%</white>!</gold> <gray>You are now on <white>%server%</white>.</gray>"
      - "<gray>Online players:</gray> <white>%online%</white><gray>/</gray><white>%max%</white>"
      - "<gray>Useful commands:</gray> <white>/spawn</white><gray>,</gray> <white>/home</white><gray>,</gray> <white>/homes</white>"
      - "<dark_gray>--------------------------------------------------</dark_gray>"
  quit:
    broadcast: "<gray>[<gold>-</gold>]</gray> <red><white>%player%</white> left the server.</red>"

error:
  no-permission: "<gray>[<gold>FoxCore</gold>]</gray> <red>You do not have permission to do that.</red>"
  player-only: "<gray>[<gold>FoxCore</gold>]</gray> <red>Only players can use this command.</red>"
  no-safe-ground: "<gray>[<gold>FoxCore</gold>]</gray> <red>No safe ground was found for that teleport.</red>"
  no-safe-ground-other: "<gray>[<gold>FoxCore</gold>]</gray> <red>No safe ground was found to teleport <white>%player%</white>.</red>"
  teleport-failed: "<gray>[<gold>FoxCore</gold>]</gray> <red>The teleport could not be completed.</red>"
  teleport-failed-other: "<gray>[<gold>FoxCore</gold>]</gray> <red>The teleport for <white>%player%</white> could not be completed.</red>"

command:
  back:
    usage: "<gray>[<gold>FoxCore</gold>]</gray> <yellow>Usage:</yellow> <white>/back</white>"
    loading: "<gray>[<gold>FoxCore</gold>]</gray> <yellow>Your back data is still loading. Try again in a moment.</yellow>"
    none: "<gray>[<gold>FoxCore</gold>]</gray> <red>You do not have a saved back location.</red>"
    missing-world: "<gray>[<gold>FoxCore</gold>]</gray> <red>The saved world <white>%world%</white> is not available.</red>"
    success: "<gray>[<gold>FoxCore</gold>]</gray> <green>Teleported you back.</green>"
  delhome:
    usage: "<gray>[<gold>FoxCore</gold>]</gray> <yellow>Usage:</yellow> <white>/delhome &lt;home&gt;</white> <gray>or</gray> <white>/delhome &lt;player&gt; &lt;home&gt;</white>"
    invalid-name: "<gray>[<gold>FoxCore</gold>]</gray> <red>That is not a valid home name.</red>"
    loading: "<gray>[<gold>FoxCore</gold>]</gray> <yellow>Home data is still loading. Try again in a moment.</yellow>"
    player-not-found: "<gray>[<gold>FoxCore</gold>]</gray> <red>No stored home data was found for <white>%player%</white>.</red>"
    not-found: "<gray>[<gold>FoxCore</gold>]</gray> <red>You do not have a home named <white>%home%</white>.</red>"
    not-found-other: "<gray>[<gold>FoxCore</gold>]</gray> <red><white>%player%</white> does not have a home named <white>%home%</white>.</red>"
    success-self: "<gray>[<gold>FoxCore</gold>]</gray> <green>Deleted home <white>%home%</white>.</green>"
    success-other: "<gray>[<gold>FoxCore</gold>]</gray> <green>Deleted home <white>%home%</white> from <white>%player%</white>.</green>"
  fly:
    usage: "<gray>[<gold>FoxCore</gold>]</gray> <yellow>Usage:</yellow> <white>/fly [player]</white>"
    not-found: "<gray>[<gold>FoxCore</gold>]</gray> <red>Player <white>%player%</white> is not online.</red>"
    world-blocked: "<gray>[<gold>FoxCore</gold>]</gray> <red>Flight is not allowed in world <white>%world%</white>.</red>"
    world-blocked-other: "<gray>[<gold>FoxCore</gold>]</gray> <red><white>%player%</white> cannot use flight in world <white>%world%</white>.</red>"
    enabled-self: "<gray>[<gold>FoxCore</gold>]</gray> <green>Flight enabled.</green>"
    disabled-self: "<gray>[<gold>FoxCore</gold>]</gray> <yellow>Flight disabled.</yellow>"
    enabled-other: "<gray>[<gold>FoxCore</gold>]</gray> <green>Enabled flight for <white>%player%</white>.</green>"
    disabled-other: "<gray>[<gold>FoxCore</gold>]</gray> <yellow>Disabled flight for <white>%player%</white>.</yellow>"
    enabled-by-other: "<gray>[<gold>FoxCore</gold>]</gray> <green><white>%player%</white> enabled your flight.</green>"
    disabled-by-other: "<gray>[<gold>FoxCore</gold>]</gray> <yellow><white>%player%</white> disabled your flight.</yellow>"
    disabled-world: "<gray>[<gold>FoxCore</gold>]</gray> <yellow>Flight was disabled because world <white>%world%</white> does not allow it for you.</yellow>"
  gamemode:
    not-found: "<gray>[<gold>FoxCore</gold>]</gray> <red>Player <white>%player%</white> is not online.</red>"
    gma:
      usage: "<gray>[<gold>FoxCore</gold>]</gray> <yellow>Usage:</yellow> <white>/gma [player]</white>"
      success-self: "<gray>[<gold>FoxCore</gold>]</gray> <green>Gamemode set to adventure.</green>"
      success-other: "<gray>[<gold>FoxCore</gold>]</gray> <green>Set <white>%player%</white> to adventure mode.</green>"
      success-by-other: "<gray>[<gold>FoxCore</gold>]</gray> <green><white>%player%</white> set your gamemode to adventure.</green>"
    gmc:
      usage: "<gray>[<gold>FoxCore</gold>]</gray> <yellow>Usage:</yellow> <white>/gmc [player]</white>"
      success-self: "<gray>[<gold>FoxCore</gold>]</gray> <green>Gamemode set to creative.</green>"
      success-other: "<gray>[<gold>FoxCore</gold>]</gray> <green>Set <white>%player%</white> to creative mode.</green>"
      success-by-other: "<gray>[<gold>FoxCore</gold>]</gray> <green><white>%player%</white> set your gamemode to creative.</green>"
    gms:
      usage: "<gray>[<gold>FoxCore</gold>]</gray> <yellow>Usage:</yellow> <white>/gms [player]</white>"
      success-self: "<gray>[<gold>FoxCore</gold>]</gray> <green>Gamemode set to survival.</green>"
      success-other: "<gray>[<gold>FoxCore</gold>]</gray> <green>Set <white>%player%</white> to survival mode.</green>"
      success-by-other: "<gray>[<gold>FoxCore</gold>]</gray> <green><white>%player%</white> set your gamemode to survival.</green>"
    gmsp:
      usage: "<gray>[<gold>FoxCore</gold>]</gray> <yellow>Usage:</yellow> <white>/gmsp [player]</white>"
      success-self: "<gray>[<gold>FoxCore</gold>]</gray> <green>Gamemode set to spectator.</green>"
      success-other: "<gray>[<gold>FoxCore</gold>]</gray> <green>Set <white>%player%</white> to spectator mode.</green>"
      success-by-other: "<gray>[<gold>FoxCore</gold>]</gray> <green><white>%player%</white> set your gamemode to spectator.</green>"
  sethome:
    usage: "<gray>[<gold>FoxCore</gold>]</gray> <yellow>Usage:</yellow> <white>/sethome [name]</white>"
    invalid-name: "<gray>[<gold>FoxCore</gold>]</gray> <red>Home names must use only letters, numbers, underscores, or dashes and be at most 32 characters long.</red>"
    loading: "<gray>[<gold>FoxCore</gold>]</gray> <yellow>Your home data is still loading. Try again in a moment.</yellow>"
    limit-reached: "<gray>[<gold>FoxCore</gold>]</gray> <red>You have reached your home limit of <white>%max%</white>.</red>"
    success: "<gray>[<gold>FoxCore</gold>]</gray> <green>Set home <white>%home%</white>.</green>"
  sethomeicon:
    usage: "<gray>[<gold>FoxCore</gold>]</gray> <yellow>Usage:</yellow> <white>/sethomeicon &lt;name&gt; [material]</white>"
    invalid-home: "<gray>[<gold>FoxCore</gold>]</gray> <red>That is not a valid home name.</red>"
    invalid-icon: "<gray>[<gold>FoxCore</gold>]</gray> <red>That item cannot be used as a home icon. Use a valid item material or hold an item in your main hand.</red>"
    loading: "<gray>[<gold>FoxCore</gold>]</gray> <yellow>Your home data is still loading. Try again in a moment.</yellow>"
    not-found: "<gray>[<gold>FoxCore</gold>]</gray> <red>You do not have a home named <white>%home%</white>.</red>"
    success: "<gray>[<gold>FoxCore</gold>]</gray> <green>Updated home <white>%home%</white> icon to <white>%icon%</white>.</green>"
  home:
    usage: "<gray>[<gold>FoxCore</gold>]</gray> <yellow>Usage:</yellow> <white>/home [name]</white>"
    invalid-name: "<gray>[<gold>FoxCore</gold>]</gray> <red>That is not a valid home name.</red>"
    loading: "<gray>[<gold>FoxCore</gold>]</gray> <yellow>Your home data is still loading. Try again in a moment.</yellow>"
    not-found: "<gray>[<gold>FoxCore</gold>]</gray> <red>You do not have a home named <white>%home%</white>.</red>"
    missing-world: "<gray>[<gold>FoxCore</gold>]</gray> <red>The world <white>%world%</white> for home <white>%home%</white> is not available.</red>"
    success: "<gray>[<gold>FoxCore</gold>]</gray> <green>Teleported to home <white>%home%</white>.</green>"
  homes:
    usage: "<gray>[<gold>FoxCore</gold>]</gray> <yellow>Usage:</yellow> <white>/homes [player]</white>"
    loading: "<gray>[<gold>FoxCore</gold>]</gray> <yellow>Home data is still loading. Try again in a moment.</yellow>"
    player-not-found: "<gray>[<gold>FoxCore</gold>]</gray> <red>No stored home data was found for <white>%player%</white>.</red>"
    empty-self: "<gray>[<gold>FoxCore</gold>]</gray> <yellow>You do not have any homes.</yellow>"
    empty-other: "<gray>[<gold>FoxCore</gold>]</gray> <yellow><white>%player%</white> does not have any homes.</yellow>"
    success-self: "<gray>[<gold>FoxCore</gold>]</gray> <green>Your homes (<white>%count%</white>): <white>%homes%</white></green>"
    success-other: "<gray>[<gold>FoxCore</gold>]</gray> <green>Homes for <white>%player%</white> (<white>%count%</white>): <white>%homes%</white></green>"
    teleport-other-success: "<gray>[<gold>FoxCore</gold>]</gray> <green>Teleported to <white>%player%</white>'s home <white>%home%</white>.</green>"
  renamehome:
    usage: "<gray>[<gold>FoxCore</gold>]</gray> <yellow>Usage:</yellow> <white>/renamehome &lt;old&gt; &lt;new&gt;</white>"
    invalid-name: "<gray>[<gold>FoxCore</gold>]</gray> <red>Both home names must be valid names.</red>"
    loading: "<gray>[<gold>FoxCore</gold>]</gray> <yellow>Your home data is still loading. Try again in a moment.</yellow>"
    not-found: "<gray>[<gold>FoxCore</gold>]</gray> <red>You do not have a home named <white>%home%</white>.</red>"
    already-exists: "<gray>[<gold>FoxCore</gold>]</gray> <red>You already have a home named <white>%home%</white>.</red>"
    same-name: "<gray>[<gold>FoxCore</gold>]</gray> <yellow>Your home is already named <white>%home%</white>.</yellow>"
    success: "<gray>[<gold>FoxCore</gold>]</gray> <green>Renamed home <white>%old%</white> to <white>%new%</white>.</green>"
  setspawn:
    usage: "<gray>[<gold>FoxCore</gold>]</gray> <yellow>Usage:</yellow> <white>/setspawn</white>"
    success: "<gray>[<gold>FoxCore</gold>]</gray> <green>Server spawn updated.</green>"
  spawn:
    usage: "<gray>[<gold>FoxCore</gold>]</gray> <yellow>Usage:</yellow> <white>/spawn [player]</white>"
    not-set: "<gray>[<gold>FoxCore</gold>]</gray> <red>Server spawn is not set or is disabled.</red>"
    not-found: "<gray>[<gold>FoxCore</gold>]</gray> <red>Player <white>%player%</white> is not online.</red>"
    success: "<gray>[<gold>FoxCore</gold>]</gray> <green>Teleported to spawn.</green>"
    success-by-other: "<gray>[<gold>FoxCore</gold>]</gray> <green><white>%player%</white> teleported you to spawn.</green>"
  foxcore:
    usage: "<gray>[<gold>FoxCore</gold>]</gray> <yellow>Usage:</yellow> <white>/foxcore reload</white>"
    reload-success: "<gray>[<gold>FoxCore</gold>]</gray> <green>Configuration and translations reloaded.</green>"
  tp:
    usage: "<gray>[<gold>FoxCore</gold>]</gray> <yellow>Usage:</yellow> <white>/tp <player></white>"
    not-found: "<gray>[<gold>FoxCore</gold>]</gray> <red>Player <white>%player%</white> is not online.</red>"
    offline-searching: "<gray>[<gold>FoxCore</gold>]</gray> <yellow>Searching stored location for <white>%player%</white>...</yellow>"
    offline-no-location: "<gray>[<gold>FoxCore</gold>]</gray> <red>No stored last location was found for <white>%player%</white>.</red>"
    offline-missing-world: "<gray>[<gold>FoxCore</gold>]</gray> <red>The stored world <white>%world%</white> for <white>%player%</white> is not available.</red>"
    offline-success: "<gray>[<gold>FoxCore</gold>]</gray> <green>Teleported to offline player <white>%player%</white>'s last known location.</green>"
    self: "<gray>[<gold>FoxCore</gold>]</gray> <red>You are already there.</red>"
    success: "<gray>[<gold>FoxCore</gold>]</gray> <green>Teleported to <white>%player%</white>.</green>"
    notify-target: "<gray>[<gold>FoxCore</gold>]</gray> <yellow><white>%player%</white> teleported to you.</yellow>"
  tpa:
    usage: "<gray>[<gold>FoxCore</gold>]</gray> <yellow>Usage:</yellow> <white>/tpa <player></white>"
    not-found: "<gray>[<gold>FoxCore</gold>]</gray> <red>Player <white>%player%</white> is not online.</red>"
    self: "<gray>[<gold>FoxCore</gold>]</gray> <red>You cannot send a teleport request to yourself.</red>"
    sent: "<gray>[<gold>FoxCore</gold>]</gray> <green>Teleport request sent to <white>%player%</white>. It expires in <white>%seconds%</white>s.</green>"
    received: "<gray>[<gold>FoxCore</gold>]</gray> <yellow><white>%player%</white> wants to teleport to you. Expires in <white>%seconds%</white>s.</yellow>"
    received-hint-prefix: "<gray>[<gold>FoxCore</gold>]</gray> <yellow>Choose:</yellow>"
    buttons:
      accept: "<green>[Accept]</green>"
      accept-hover: "<green>Accept <white>%player%</white>'s teleport request</green>"
      deny: "<red>[Deny]</red>"
      deny-hover: "<red>Deny <white>%player%</white>'s teleport request</red>"
  tpahere:
    usage: "<gray>[<gold>FoxCore</gold>]</gray> <yellow>Usage:</yellow> <white>/tpahere <player></white>"
    not-found: "<gray>[<gold>FoxCore</gold>]</gray> <red>Player <white>%player%</white> is not online.</red>"
    self: "<gray>[<gold>FoxCore</gold>]</gray> <red>You cannot send a teleport-here request to yourself.</red>"
    sent: "<gray>[<gold>FoxCore</gold>]</gray> <green>Teleport-here request sent to <white>%player%</white>. It expires in <white>%seconds%</white>s.</green>"
    received: "<gray>[<gold>FoxCore</gold>]</gray> <yellow><white>%player%</white> wants you to teleport to them. Expires in <white>%seconds%</white>s.</yellow>"
    received-hint-prefix: "<gray>[<gold>FoxCore</gold>]</gray> <yellow>Choose:</yellow>"
    buttons:
      accept: "<green>[Accept]</green>"
      accept-hover: "<green>Teleport to <white>%player%</white></green>"
      deny: "<red>[Deny]</red>"
      deny-hover: "<red>Deny <white>%player%</white>'s teleport-here request</red>"
  tpaccept:
    usage: "<gray>[<gold>FoxCore</gold>]</gray> <yellow>Usage:</yellow> <white>/tpaccept [player]</white>"
    none: "<gray>[<gold>FoxCore</gold>]</gray> <red>You have no pending teleport requests.</red>"
    not-found: "<gray>[<gold>FoxCore</gold>]</gray> <red>No pending request from <white>%player%</white>.</red>"
    accepted: "<gray>[<gold>FoxCore</gold>]</gray> <green>Accepted teleport request from <white>%player%</white>.</green>"
    accepted-here: "<gray>[<gold>FoxCore</gold>]</gray> <green>Accepted teleport-here request from <white>%player%</white>.</green>"
    requester-accepted: "<gray>[<gold>FoxCore</gold>]</gray> <green><white>%player%</white> accepted your teleport request.</green>"
    requester-accepted-here: "<gray>[<gold>FoxCore</gold>]</gray> <green><white>%player%</white> accepted your teleport-here request.</green>"
    requester-offline: "<gray>[<gold>FoxCore</gold>]</gray> <red>That teleport request is no longer valid because the requester is offline.</red>"
  tpadeny:
    usage: "<gray>[<gold>FoxCore</gold>]</gray> <yellow>Usage:</yellow> <white>/tpadeny [player]</white>"
    none: "<gray>[<gold>FoxCore</gold>]</gray> <red>You have no pending teleport requests.</red>"
    not-found: "<gray>[<gold>FoxCore</gold>]</gray> <red>No pending request from <white>%player%</white>.</red>"
    denied: "<gray>[<gold>FoxCore</gold>]</gray> <yellow>Denied teleport request from <white>%player%</white>.</yellow>"
    requester-denied: "<gray>[<gold>FoxCore</gold>]</gray> <red><white>%player%</white> denied your teleport request.</red>"
  tphere:
    usage: "<gray>[<gold>FoxCore</gold>]</gray> <yellow>Usage:</yellow> <white>/tphere <player></white>"
    not-found: "<gray>[<gold>FoxCore</gold>]</gray> <red>Player <white>%player%</white> is not online.</red>"
    self: "<gray>[<gold>FoxCore</gold>]</gray> <red>You cannot teleport yourself to yourself.</red>"
    success: "<gray>[<gold>FoxCore</gold>]</gray> <green>Teleported <white>%player%</white> to you.</green>"
    notify-target: "<gray>[<gold>FoxCore</gold>]</gray> <yellow>You were teleported to <white>%player%</white>.</yellow>"
