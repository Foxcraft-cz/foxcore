name: foxcore
version: ${version}
main: me.dragan.foxcore.FoxCorePlugin
api-version: "1.21"
authors: [Dragan]
description: Lightweight Paper essentials-style utilities.

commands:
  back:
    description: Teleport back to your last saved or death location.
    usage: /back
    permission: foxcore.back
  delhome:
    description: Delete one of your homes or another player's home.
    usage: /delhome <home> | /delhome <player> <home>
    permission: foxcore.delhome
  fly:
    description: Toggle flight for yourself or another player.
    usage: /fly [player]
    permission: foxcore.fly
  gma:
    description: Set your own or another player's gamemode to adventure.
    usage: /gma [player]
    permission: foxcore.gma
  gmc:
    description: Set your own or another player's gamemode to creative.
    usage: /gmc [player]
    permission: foxcore.gmc
  gms:
    description: Set your own or another player's gamemode to survival.
    usage: /gms [player]
    permission: foxcore.gms
  gmsp:
    description: Set your own or another player's gamemode to spectator.
    usage: /gmsp [player]
    permission: foxcore.gmsp
  home:
    description: Teleport to one of your homes.
    usage: /home [name]
    permission: foxcore.home
  homes:
    description: List your homes or another player's homes.
    usage: /homes [player]
    permission: foxcore.homes
  renamehome:
    description: Rename one of your homes.
    usage: /renamehome <old> <new>
    permission: foxcore.renamehome
  sethome:
    description: Set a home at your current location.
    usage: /sethome [name]
    permission: foxcore.sethome
  sethomeicon:
    description: Change the icon used for a home in the homes GUI.
    usage: /sethomeicon <name> [material]
    permission: foxcore.sethomeicon
  setspawn:
    description: Set the server spawn.
    usage: /setspawn
    permission: foxcore.setspawn
  spawn:
    description: Teleport to the server spawn.
    usage: /spawn [player]
    permission: foxcore.spawn
  tp:
    description: Teleport yourself to another online player.
    usage: /tp <player>
    permission: foxcore.tp
  tphere:
    description: Teleport another online player to you.
    usage: /tphere <player>
    permission: foxcore.tphere
  tpa:
    description: Send a teleport request to another player.
    usage: /tpa <player>
    permission: foxcore.tpa
  tpahere:
    description: Send a teleport-here request to another player.
    usage: /tpahere <player>
    permission: foxcore.tpahere
  tpaccept:
    description: Accept a pending teleport request.
    usage: /tpaccept [player]
    permission: foxcore.tpaccept
  tpadeny:
    description: Deny a pending teleport request.
    usage: /tpadeny [player]
    permission: foxcore.tpadeny
  foxcore:
    description: Main FoxCore administration command.
    usage: /foxcore reload
    permission: foxcore.reload

permissions:
  foxcore.back:
    description: Allows teleporting back to your last saved or death location.
    default: op
  foxcore.delhome:
    description: Allows deleting your own homes.
    default: true
  foxcore.delhome.others:
    description: Allows deleting another player's homes.
    default: op
  foxcore.fly:
    description: Allows toggling your own flight.
    default: op
  foxcore.fly.others:
    description: Allows toggling another player's flight.
    default: op
  foxcore.gma:
    description: Allows setting your own gamemode to adventure.
    default: op
  foxcore.gma.others:
    description: Allows setting another player's gamemode to adventure.
    default: op
  foxcore.gmc:
    description: Allows setting your own gamemode to creative.
    default: op
  foxcore.gmc.others:
    description: Allows setting another player's gamemode to creative.
    default: op
  foxcore.gms:
    description: Allows setting your own gamemode to survival.
    default: op
  foxcore.gms.others:
    description: Allows setting another player's gamemode to survival.
    default: op
  foxcore.gmsp:
    description: Allows setting your own gamemode to spectator.
    default: op
  foxcore.gmsp.others:
    description: Allows setting another player's gamemode to spectator.
    default: op
  foxcore.home:
    description: Allows teleporting to your own homes.
    default: true
  foxcore.homes:
    description: Allows listing your own homes.
    default: true
  foxcore.homes.others:
    description: Allows listing another player's homes.
    default: op
  foxcore.renamehome:
    description: Allows renaming homes.
    default: true
  foxcore.sethome:
    description: Allows setting homes.
    default: true
  foxcore.sethomeicon:
    description: Allows changing the icon used for homes.
    default: true
  foxcore.sethome.limit.unlimited:
    description: Allows setting unlimited homes.
    default: op
  foxcore.setspawn:
    description: Allows setting the server spawn.
    default: op
  foxcore.spawn:
    description: Allows teleporting to the server spawn.
    default: true
  foxcore.spawn.others:
    description: Allows teleporting another player to the server spawn.
    default: op
  foxcore.tp:
    description: Allows teleporting to another player.
    default: op
  foxcore.tp.offline:
    description: Allows teleporting to an offline player's stored last location.
    default: op
  foxcore.tphere:
    description: Allows teleporting another player to yourself.
    default: op
  foxcore.tpa:
    description: Allows sending teleport requests.
    default: op
  foxcore.tpahere:
    description: Allows sending teleport-here requests.
    default: op
  foxcore.tpaccept:
    description: Allows accepting teleport requests.
    default: op
  foxcore.tpadeny:
    description: Allows denying teleport requests.
    default: op
  foxcore.reload:
    description: Allows reloading FoxCore configuration and translations.
    default: op
