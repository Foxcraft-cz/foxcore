name: foxcore
version: ${version}
main: me.dragan.foxcore.FoxCorePlugin
api-version: "1.21"
authors: [Dragan]
description: Lightweight Paper essentials-style utilities.
softdepend: [PlaceholderAPI]

commands:
  afk:
    description: Toggle your AFK state manually.
    usage: /afk
    permission: foxcore.afk.command
  back:
    description: Teleport back to your last saved or death location.
    usage: /back
    permission: foxcore.back
  anvil:
    description: Open a virtual anvil.
    usage: /anvil
    permission: foxcore.anvil
  cartographytable:
    aliases: [cartography]
    description: Open a virtual cartography table.
    usage: /cartographytable
    permission: foxcore.cartographytable
  craft:
    aliases: [wb, workbench]
    description: Open a virtual crafting table.
    usage: /craft
    permission: foxcore.craft
  delhome:
    description: Delete one of your homes or another player's home.
    usage: /delhome <home> | /delhome <player> <home>
    permission: foxcore.delhome
  day:
    description: Set your current world time to day.
    usage: /day
    permission: foxcore.day
  enderchest:
    aliases: [ec]
    description: Open your ender chest.
    usage: /enderchest
    permission: foxcore.enderchest
  fly:
    description: Toggle flight for yourself or another player.
    usage: /fly [player]
    permission: foxcore.fly
  gma:
    description: Set your own or another player's gamemode to adventure.
    usage: /gma [player]
    permission: foxcore.gma
  gmc:
    description: Set your own or another player's gamemode to creative.
    usage: /gmc [player]
    permission: foxcore.gmc
  gms:
    description: Set your own or another player's gamemode to survival.
    usage: /gms [player]
    permission: foxcore.gms
  gmsp:
    description: Set your own or another player's gamemode to spectator.
    usage: /gmsp [player]
    permission: foxcore.gmsp
  grindstone:
    description: Open a virtual grindstone.
    usage: /grindstone
    permission: foxcore.grindstone
  hat:
    description: Put the item in your hand on your head.
    usage: /hat
    permission: foxcore.hat
  head:
    aliases: [skull]
    description: Give yourself a player head by name.
    usage: /head [player] [amount]
    permission: foxcore.head
  home:
    description: Teleport to one of your homes.
    usage: /home [name]
    permission: foxcore.home
  homes:
    description: List your homes or another player's homes.
    usage: /homes [player]
    permission: foxcore.homes
  onlinetime:
    aliases: [playtime]
    description: Show session and total playtime information.
    usage: /onlinetime [player]
    permission: foxcore.onlinetime
  portal:
    description: Manage world navigation portals.
    usage: /portal <wand|pos1|pos2|create|redefine|setaction|setcooldown|setparticles|enable|disable|delete|info|list>
    permission: foxcore.portal.admin
  loom:
    description: Open a virtual loom.
    usage: /loom
    permission: foxcore.loom
  night:
    description: Set your current world time to night.
    usage: /night
    permission: foxcore.night
  renamehome:
    description: Rename one of your homes.
    usage: /renamehome <old> <new>
    permission: foxcore.renamehome
  rain:
    description: Start rain in your current world.
    usage: /rain
    permission: foxcore.rain
  warp:
    description: Browse, use, and manage public warps.
    usage: /warp [name|create|delete|rename|movehere|icon|title|description]
    permission: foxcore.warp
  setwarp:
    description: Create or update a server warp.
    usage: /setwarp <name>
    permission: foxcore.warp.server.manage
  delwarp:
    description: Delete a server warp.
    usage: /delwarp <name>
    permission: foxcore.warp.server.manage
  adminwarp:
    description: Admin tools for editing any warp.
    usage: /adminwarp <delete|rename|movehere|icon|title|description> ...
    permission: foxcore.adminwarp
  rtp:
    description: Teleport to a random safe location in your current world.
    usage: /rtp
    permission: foxcore.rtp
  seen:
    description: Show when a player was last online.
    usage: /seen <playername>
    permission: foxcore.seen
  whois:
    description: Show admin details about a player profile.
    usage: /whois <playername>
    permission: foxcore.whois
  sethome:
    description: Set a home at your current location.
    usage: /sethome [name]
    permission: foxcore.sethome
  sethomeicon:
    description: Change the icon used for a home in the homes GUI.
    usage: /sethomeicon <name> [material]
    permission: foxcore.sethomeicon
  setspawn:
    description: Set the server spawn.
    usage: /setspawn
    permission: foxcore.setspawn
  sun:
    description: Clear weather in your current world.
    usage: /sun
    permission: foxcore.sun
  speed:
    description: Set flight speed for yourself or another player.
    usage: /speed <1-10> [player]
    permission: foxcore.speed
  smithingtable:
    aliases: [smithing]
    description: Open a virtual smithing table.
    usage: /smithingtable
    permission: foxcore.smithingtable
  spawn:
    description: Teleport to the server spawn.
    usage: /spawn [player]
    permission: foxcore.spawn
  stonecutter:
    description: Open a virtual stonecutter.
    usage: /stonecutter
    permission: foxcore.stonecutter
  tp:
    description: Teleport yourself to another online player.
    usage: /tp <player>
    permission: foxcore.tp
  tphere:
    description: Teleport another online player to you.
    usage: /tphere <player>
    permission: foxcore.tphere
  tpa:
    description: Send a teleport request to another player.
    usage: /tpa <player>
    permission: foxcore.tpa
  tpahere:
    description: Send a teleport-here request to another player.
    usage: /tpahere <player>
    permission: foxcore.tpahere
  tpaccept:
    description: Accept a pending teleport request.
    usage: /tpaccept [player]
    permission: foxcore.tpaccept
  tpadeny:
    description: Deny a pending teleport request.
    usage: /tpadeny [player]
    permission: foxcore.tpadeny
  foxcore:
    description: Main FoxCore administration command.
    usage: /foxcore reload
    permission: foxcore.reload

permissions:
  foxcore.afk.command:
    description: Allows toggling your own AFK state manually.
    default: true
  foxcore.back:
    description: Allows teleporting back to your last saved or death location.
