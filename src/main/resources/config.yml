storage:
  type: sqlite
  sqlite:
    file: storage/foxcore.db
  mysql:
    host: 127.0.0.1
    port: 3306
    database: foxcore
    username: root
    password: ""
    pool-size: 5
    table-prefix: foxcore_

back:
  prioritize-death: true

homes:
  default-max-count: 1

join-messages:
  join-broadcast-enabled: true
  first-join-broadcast-enabled: true
  quit-broadcast-enabled: true
  personal-enabled: true

afk:
  enabled: true
  idle-seconds: 300
  check-interval-seconds: 5
  broadcast-state-changes: true
  kick:
    enabled: true
    after-seconds: 1800

portals:
  enabled: true
  teleport-immunity-seconds: 2
  particles:
    interval-ticks: 10
    view-distance-blocks: 24

spawn:
  enabled: true
  on-respawn: false
  on-join: false
  on-first-join: false
  location:
    world: ""
    x: 0.0
    y: 0.0
    z: 0.0
    yaw: 0.0
    pitch: 0.0

rtp:
  enabled: true
  cooldown-seconds: 300
  max-chunk-attempts: 8
  samples-per-chunk: 4
  worlds:
    world:
      enabled: true
      min-radius: 500
      max-radius: 5000
      center-x: 0.0
      center-z: 0.0
      icon: GRASS_BLOCK
    world_nether:
      enabled: true
      min-radius: 300
      max-radius: 2000
      center-x: 0.0
      center-z: 0.0
      icon: NETHERRACK

translations:
  locale: en

teleport:
  notify-target: true

warp:
  teleport-cooldown-seconds: 0

tpa:
  request-expiration-seconds: 60
